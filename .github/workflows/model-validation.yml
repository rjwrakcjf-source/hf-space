name: Model Validation

on:
  push:
    paths:
      - 'models/**'
      - 'libs/models/**'
  pull_request:
    paths:
      - 'models/**'
      - 'libs/models/**'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  validate-catalog:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '18'
      - name: Install pnpm
        run: npm install -g pnpm@8.15.6
      - name: Install dependencies
        run: pnpm install
      - name: Validate model catalog
        run: node packages/scripts/validate-catalog.js
      - name: Check model metadata
        run: node packages/scripts/check-model-metadata.js
