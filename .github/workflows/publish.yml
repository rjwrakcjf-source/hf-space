name: Publish & Release

on:
  push:
    tags:
      - 'v*.*.*'

permissions:
  contents: write

jobs:
  publish-npm:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '18'
          registry-url: 'https://registry.npmjs.org'
      - name: Install pnpm
        run: npm install -g pnpm@8.15.6
      - name: Install dependencies
        run: pnpm install
      - name: Build packages
        run: pnpm build
      - name: Publish to npm
        run: pnpm publish --recursive --filter='./libs/*'
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

  build-desktop:
    runs-on: ${{ matrix.os }}
    permissions:
      contents: write
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Install pnpm
        run: npm install -g pnpm@8.15.6

      - name: Install dependencies
        run: pnpm install

      - name: Build shared libraries
        run: pnpm build --filter='./libs/*'

      - name: Build web renderer
        run: pnpm build --filter=web

      # electron-builder --publish always uploads installers + update manifests
      # directly to the GitHub Release created by the tag push.
      - name: Build & publish desktop installers
        run: pnpm --filter=desktop run dist
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # macOS code signing (optional – set secrets in repo settings)
          CSC_LINK: ${{ secrets.CSC_LINK }}
          CSC_KEY_PASSWORD: ${{ secrets.CSC_KEY_PASSWORD }}
          # Windows code signing (optional)
          WIN_CSC_LINK: ${{ secrets.WIN_CSC_LINK }}
          WIN_CSC_KEY_PASSWORD: ${{ secrets.WIN_CSC_KEY_PASSWORD }}

      - name: Upload build artifacts (for manual inspection)
        uses: actions/upload-artifact@v4
        with:
          name: desktop-${{ matrix.os }}
          path: |
            apps/desktop/dist/*.exe
            apps/desktop/dist/*.dmg
            apps/desktop/dist/*.AppImage
            apps/desktop/dist/*.deb
            apps/desktop/dist/*.yml
          if-no-files-found: ignore
